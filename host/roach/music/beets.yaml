directory: /mnt/data/music
library: /mnt/data/music/library.db

import:
    move: yes
    incremental: yes
    quiet: yes
    log: /tmp/beetslog.txt

plugins:
    - musicbrainz
    - fetchart
    - embedart
    - lastgenre
    - lyrics
    - missing
    - duplicates
    - badfiles
    - edit

embedart:
    remove_art_file: yes
