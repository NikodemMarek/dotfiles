[colors]
background = #01011D
foreground = #353F67
primary = #7FDF64
secondary = #61FEF4
alert = #BF2147

cyan = #00afaf
aqua = #259185
red = #D01B24
yellow = #A57705
green = #859900
orange = #BD3612
magenta = #5856B9
white = #81908F
pink = #C61B6E
blue = #2075C7

[bar/main]
width = 100%
height = 24pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.foreground}

font-0 = "RobotoMono Nerd Font Mono;3"

modules-left = xworkspaces
modules-right = memory cpu filesystem battery pulseaudio wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.secondary}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = "о‰¦ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "пЎљ "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /home

format-mounted-prefix-foreground = ${colors.primary}
format-mounted-prefix = "пќЉ "

format-unmounted-prefix-foreground = ${colors.alert}
format-unmounted-prefix = "пќЉ "

format-mounted = <label-mounted>

label-mounted = %percentage_used%%

label-unmounted-foreground = ${colors.foreground}
label-unmounted = %mountpoint% not mounted

[module/battery]
type = internal/battery
poll-interval = 5

battery = BAT1
adapter = ACAD

low-at = 10
full-at = 98

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
format-charging-foreground = ${colors.primary}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = ${colors.primary}

format-full-prefix = "п•ё "
format-full-prefix-foreground = ${colors.primary}
format-background = ${colors.background}

label-discharging-foreground = ${colors.foreground}
label-charging-foreground = ${colors.foreground}

ramp-capacity-0 = "п•№ "
ramp-capacity-1 = "п•є "
ramp-capacity-2 = "п•» "
ramp-capacity-3 = "п•ј "
ramp-capacity-4 = "п•Ѕ "
ramp-capacity-5 = "п•ѕ "
ramp-capacity-6 = "п•ї "
ramp-capacity-7 = "п–Ђ "
ramp-capacity-8 = "п–Ѓ "
ramp-capacity-9 = "п•ё "

animation-charging-0 = "п•№ "
animation-charging-1 = "п•є "
animation-charging-2 = "п•» "
animation-charging-3 = "п•ј "
animation-charging-4 = "п•Ѕ "
animation-charging-5 = "п•ѕ "
animation-charging-6 = "п•ї "
animation-charging-7 = "п–Ђ "
animation-charging-8 = "п–Ѓ "
animation-charging-9 = "п•ё "

animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 250

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "п©Ѕ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.foreground}

[network-base]
type = internal/network
interval = 5

format-connected-prefix = "пЄЁ "
format-connected-prefix-foreground = ${colors.primary}

format-connected = <label-connected>

format-disconnected-foreground = ${colors.alert}
format-disconnected = пЄ©

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected =  %essid% - %downspeed%

[module/eth]
inherit = network-base
interface-type = wired

label-connected-foreground = ${colors.primary}
label-connected-prefix = "п›ї "
label-connected = "- %downspeed%"

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d.%m.%Y %H:%M:%S

format-foreground = ${colors.primary}
format-prefix = "п™Џ "

label-foreground = ${colors.foreground}
label = %date%

[settings]
screenchange-reload = true
pseudo-transparency = true
